<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pompit! Camera</title>
<style>
/* Reset totale */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;touch-action:none;}

#app{position:relative;width:100vw;height:100vh;overflow:hidden;}

/* Video e Sfondi */
#video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;}

/* SFONDO GRADIENTE 100% - Questo copre tutto il canvas */
#full-canvas-bg {
  position: absolute;
  inset: 0; /* Copre tutto da top 0 a bottom 0 */
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 40%, transparent 100%);
  z-index: 5; /* Sopra al video, sotto ai tasti */
  pointer-events: none;
}

#square-frame{position:absolute;width:100vw;height:100vw;top:50%;left:50%;
  transform:translate(-50%,-50%);z-index:6;pointer-events:none;}

/* SIDE MENU - CORRETTO */
#side-menu {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%) translateX(-150%); /* Nasconde a sinistra */
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 999; /* MASSIMA PRIORITÀ */
  transition: transform 0.3s ease;
  pointer-events: none;
}

#side-menu.open {
  transform: translateY(-50%) translateX(0); /* Entra in scena */
  pointer-events: all;
}

.smenu-btn {
  width: 65px;
  padding: 12px 5px;
  border-radius: 18px;
  background: rgba(20, 20, 20, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  font-size: 8px;
  text-transform: uppercase;
  font-weight: bold;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

/* UI IN BASSO */
#ui {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 20px 20px 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

#bottom-row {
  width: 100%;
  max-width: 400px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#shutter-btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #fff;
  border: 4px solid rgba(255,255,255,0.3);
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

.icon-btn {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.3);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

.icon-btn.active {
  background: #fff;
  color: #000;
}

/* START SCREEN */
#start-screen {
  position: absolute;
  inset: 0;
  background: white;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>

<div id="app">
  <video id="video" autoplay playsinline muted></video>
  
  <div id="full-canvas-bg"></div>

  <div id="square-frame">
    <canvas id="overlay-canvas" style="width:100%; height:100%;"></canvas>
  </div>

  <div id="side-menu" id="sideMenu">
    <button class="smenu-btn">Colore</button>
    <button class="smenu-btn">Opacità</button>
    <button class="smenu-btn">Size</button>
  </div>

  <div id="ui">
    <div id="bottom-row">
      <button class="icon-btn" id="settings-btn" onclick="toggleSideMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      
      <button id="shutter-btn" onclick="console.log('scatto')"></button>
      
      <button class="icon-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
    </div>
  </div>

  <div id="start-screen">
    <div style="text-align:center">
        <h2>Pompit!</h2>
        <button onclick="startApp()" style="margin-top:20px; padding:15px 40px; border-radius:30px; border:none; background:#000; color:#fff;">ENTRA</button>
    </div>
  </div>
</div>

<script>
function startApp() {
    document.getElementById('start-screen').style.display = 'none';
}

function toggleSideMenu() {
    const menu = document.getElementById('side-menu');
    const btn = document.getElementById('settings-btn');
    
    // Toggle della classe invece di manipolare lo style display
    menu.classList.toggle('open');
    btn.classList.toggle('active');
}
</script>
</body>
</html>
