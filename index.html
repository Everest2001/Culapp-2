<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">
<title>Pompit! Camera</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;touch-action:none;}
#app{position:relative;width:100vw;height:100vh;background:#000;}
#video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;}

/* FIX SFONDO: Portato al 100% altezza indipendentemente dal logo */
#bg-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.3) 65%, transparent 100%);
  z-index: 5;
  pointer-events: none;
}

.dim{position:absolute;left:0;right:0;background:rgba(0,0,0,0.6);z-index:2;pointer-events:none;}
#dim-top{top:0;height:calc(50vh - 50vw);min-height:0;}
#dim-bottom{bottom:0;height:calc(50vh - 50vw);min-height:0;}
#square-frame{position:absolute;width:100vw;height:100vw;top:50%;left:50%;
  transform:translate(-50%,-50%);z-index:3;pointer-events:none;overflow:hidden;}
#overlay-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:4;pointer-events:none;}
.corner{position:absolute;width:28px;height:28px;border-color:rgba(255,255,255,0.6);
  border-style:solid;z-index:5;}
.corner.tl{top:0;left:0;border-width:2px 0 0 2px;}
.corner.tr{top:0;right:0;border-width:2px 2px 0 0;}
.corner.bl{bottom:0;left:0;border-width:0 0 2px 2px;}
.corner.br{bottom:0;right:0;border-width:0 2px 2px 0;}

/* ── START ── */
#start-screen{position:absolute;inset:0;background:#fff;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:32px;padding:48px 36px;}
#pompit-logo{width:290px;height:auto;}
.sbtn{width:100%;max-width:280px;border:none;padding:17px 0;border-radius:50px;
  font-size:13px;letter-spacing:3px;text-transform:uppercase;font-weight:800;cursor:pointer;}
.sbtn.primary{background:#111;color:#fff;}

/* ── SIDE MENU: FIX APERTURA ── */
#side-menu{
  position:absolute;left:0;top:0;bottom:0;width:68px;z-index:100;
  display: flex; /* Cambiato da none a flex */
  opacity: 0;    /* Nascondiamo con opacity */
  pointer-events: none;
  flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:16px 6px;
  transition: opacity 0.2s ease;
}
#side-menu.open{opacity: 1; pointer-events:all;}

.smenu-btn{
  width:56px;padding:9px 4px 7px;border-radius:16px;
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6);
  font-size:7.5px;letter-spacing:1px;text-transform:uppercase;font-weight:700;
  cursor:pointer;text-align:center;line-height:1.3;
  transition:all .15s;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.smenu-btn svg{display:block;margin:0 auto 3px;}
.smenu-btn.active{background:rgba(255,255,255,0.92);color:#000;border-color:transparent;}

/* ── BOTTOM UI ── */
#ui{position:absolute;bottom:0;left:0;right:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:10px 16px 46px;
  /* Gradiente rimosso da qui e messo in #bg-overlay */
}

/* Resto dello stile invariato */
#ctrl-bar{width:100%;max-width:400px;height:52px;display:flex;align-items:center;gap:14px;padding:0 6px;opacity:0;pointer-events:none;transition:opacity .18s;}
#ctrl-bar.show{opacity:1;pointer-events:all;}
#mode-switcher{display:flex;gap:7px;width:100%;max-width:400px;}
.mode-btn{flex:1;padding:11px 6px;border-radius:24px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);font-size:9px;text-transform:uppercase;font-weight:600;cursor:pointer;text-align:center;}
.mode-btn.active{background:#fff;color:#000;border-color:transparent;font-weight:800;}
#bottom-row{width:100%;max-width:400px;display:flex;align-items:center;justify-content:space-between;}
.icon-btn{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.2);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#shutter-btn{width:82px;height:82px;border-radius:50%;background:#fff;border:3px solid rgba(255,255,255,0.4);box-shadow:0 0 0 6px rgba(255,255,255,0.13);cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <div id="bg-overlay"></div> <div class="dim" id="dim-top"></div>
  <div class="dim" id="dim-bottom"></div>
  <video id="video" autoplay playsinline muted></video>

  <div id="square-frame">
    <canvas id="overlay-canvas"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

  <div id="side-menu">
    <button class="smenu-btn" onclick="console.log('stroke')">Colore</button>
    <button class="smenu-btn" onclick="console.log('opacity')">Opacità</button>
    <button class="smenu-btn" onclick="console.log('size')">Size</button>
  </div>

  <div id="ui">
    <div id="mode-switcher">
      <button class="mode-btn active">Modo 1<br>Solo logo</button>
      <button class="mode-btn">Modo 2<br>+ Sfondo</button>
      <button class="mode-btn">Modo 3<br>+ Foto</button>
    </div>

    <div id="bottom-row">
      <button class="icon-btn" id="settings-btn" onclick="toggleSideMenu()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button id="shutter-btn"></button>
      <button class="icon-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
    </div>
  </div>

  <div id="start-screen">
    <button class="sbtn primary" onclick="document.getElementById('start-screen').style.display='none'">Inizia</button>
  </div>
</div>

<script>
function toggleSideMenu() {
  const menu = document.getElementById('side-menu');
  menu.classList.toggle('open');
}
</script>
</body>
</html>
